<h1>Albums</h1>

<div *ngIf="loading" class="loading">Loading albums...</div>

<ul class="list" *ngIf="!loading">
  <li class="item" *ngFor="let a of (albums$ | async)">
    <a class="title" [routerLink]="['/albums', a.id]">
      <b>#{{ a.id }}</b> — {{ a.title }}
    </a>

    <button class="del" (click)="deleteAlbum(a.id)">Delete</button>
  </li>
</ul>

<div *ngIf="!loading && (albums$ | async)?.length === 0" class="empty">
  No albums.
</div>
